name: Web CI

on:
  push:
    branches: [master]
    paths:
      - "app/web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [master]
    paths:
      - "app/web/**"
      - ".github/workflows/web.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
