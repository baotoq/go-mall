postgres:
  fullnameOverride: postgres
  auth:
    username: mall
    password: mall
    database: mall
  primary:
    initdb:
      scripts:
        create_workflow_db.sql: |
          CREATE DATABASE workflow;
          GRANT ALL PRIVILEGES ON DATABASE workflow TO mall;
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        memory: 192Mi
  metrics:
    enabled: false

keycloak:
  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: "26.3.3"
  auth:
    adminUser: admin
    adminPassword: admin
  javaOptsAppend: "-Xms64m -Xmx256m"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 768Mi

redis:
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 64Mi
  metrics:
    enabled: false
