apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: {{ .Release.Namespace }}
data:
  realm-export.json: |
    {
      "realm": "gomall",
      "enabled": true,
      "bruteForceProtected": true,
      "maxFailureWaitSeconds": 900,
      "maxDeltaTimeSeconds": 43200,
      "failureFactor": 5,
      "waitIncrementSeconds": 60,
      "quickLoginCheckMilliSeconds": 1000,
      "minimumQuickLoginWaitSeconds": 60,
      "passwordPolicy": "length(8)",
      "revokeRefreshToken": false,
      "clients": [
        {
          "clientId": "gomall-frontend",
          "enabled": true,
          "publicClient": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true,
          "standardFlowEnabled": false,
          "secret": "dev-secret-change-in-prod",
          "redirectUris": [],
          "webOrigins": []
        }
      ],
      "users": [
        {
          "username": "service-account-gomall-frontend",
          "enabled": true,
          "serviceAccountClientId": "gomall-frontend",
          "clientRoles": {
            "realm-management": ["manage-users"]
          }
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    app: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}
          args: ["start-dev", "--import-realm"]
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.auth.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.auth.adminPassword | quote }}
            - name: JAVA_OPTS_APPEND
              value: {{ .Values.keycloak.javaOptsAppend | default "-Xms64m -Xmx256m" | quote }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
