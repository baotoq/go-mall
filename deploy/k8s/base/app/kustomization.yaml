apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - catalog.yaml
  - cart.yaml
  - payment.yaml
  - rbac.yaml
configMapGenerator:
  - name: catalog-config
    files:
      - config.yaml=../../../../app/catalog/configs/config.yaml
generatorOptions:
  disableNameSuffixHash: true
