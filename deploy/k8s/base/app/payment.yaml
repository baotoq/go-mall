apiVersion: v1
kind: Service
metadata:
  name: payment
spec:
  ports:
    - name: http
      port: 8000
    - name: grpc
      port: 9000
  selector:
    app: payment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
spec:
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "payment"
        dapr.io/log-as-json: "true"
    spec:
      containers:
        - name: payment
          image: payment
          ports:
            - containerPort: 8000
            - containerPort: 9000
          volumeMounts:
            - name: config
              mountPath: /data/conf
      volumes:
        - name: config
          configMap:
            name: payment-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 200s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 200s
    data:
      database:
        driver: postgres
        source: ""
