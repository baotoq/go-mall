apiVersion: v1
kind: Service
metadata:
  name: catalog
spec:
  ports:
    - name: http
      port: 8000
    - name: grpc
      port: 9000
  selector:
    app: catalog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
spec:
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "catalog"
        dapr.io/app-port: "8000"
        dapr.io/log-as-json: "true"
    spec:
      containers:
        - name: catalog
          image: catalog
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8000
            - containerPort: 9000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /data/conf
      volumes:
        - name: config
          configMap:
            name: catalog-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-config
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 200s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 200s
      auth:
        jwks_url: ""
    data:
      database:
        driver: postgres
        source: ""
      redis:
        network: tcp
        addr: ""
        read_timeout: 0.2s
        write_timeout: 0.2s
      pubsub:
        name: pubsub
        topic: ""
