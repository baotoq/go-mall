Name: payment-api
Host: 0.0.0.0
Port: 8080
Timeout: 30000

Log:
  Mode: console
  Level: info

DevServer:
  Port: 9013

Keycloak:
  RealmURL: "http://keycloak.go-mall.svc.cluster.local:8080/realms/go-mall"
  ClientID: "payment"
  ClientSecret: ""
  JWKSCacheTTL: 24h

Telemetry:
  Name: payment-api
  Endpoint: jaeger.go-mall.svc.cluster.local:4318
  Sampler: 1.0
  Batcher: otlphttp

DB:
  DSN: "postgres://postgres:gomall@postgres:5432/payment?sslmode=disable"
