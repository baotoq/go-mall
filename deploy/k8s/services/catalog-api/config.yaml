Name: catalog-api
Host: 0.0.0.0
Port: 8080

Log:
  Mode: console
  Level: info

DevServer:
  Port: 9011

Keycloak:
  RealmURL: "http://keycloak.go-mall.svc.cluster.local:8080/realms/go-mall"
  ClientID: "catalog"
  ClientSecret: ""
  JWKSCacheTTL: 24h

Telemetry:
  Name: catalog-api
  Endpoint: http://jaeger.go-mall.svc.cluster.local:4318
  Sampler: 1.0
  Batcher: otlphttp

DB:
  DSN: "postgres://postgres:gomall@postgres:5432/catalog?sslmode=disable"
