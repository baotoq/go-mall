apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      containers:
        - name: storefront
          image: go-mall/storefront
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: CATALOG_SERVICE_URL
              value: "http://catalog:8080"
            - name: CART_SERVICE_URL
              value: "http://cart:8080"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment:8080"
          startupProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: storefront
  ports:
    - port: 3000
      targetPort: 3000
