apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis.go-mall.svc.cluster.local:6379
    - name: redisPassword
      value: ""
scopes:
  - catalog-api
  - cart-api
  - payment-api
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis.go-mall.svc.cluster.local:6379
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
scopes:
  - catalog-api
  - cart-api
  - payment-api
