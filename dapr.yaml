version: 1
common:
  resourcesPath: ./.dapr/components
apps:
  - appID: catalog-api
    appPort: 9001
    daprHTTPPort: 3500
    command: ["go", "run", ".", "-f", "etc/catalog-api.yaml"]
    appDirPath: ./src/catalog
  - appID: cart-api
    appPort: 9002
    daprHTTPPort: 3501
    command: ["go", "run", "cart.go", "-f", "etc/cart-api.yaml"]
    appDirPath: ./src/cart
  - appID: payment-api
    appPort: 9003
    daprHTTPPort: 3502
    command: ["go", "run", "payment.go", "-f", "etc/payment-api.yaml"]
    appDirPath: ./src/payment
