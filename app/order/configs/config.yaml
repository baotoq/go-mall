server:
  http:
    addr: 0.0.0.0:8000
    timeout: 200s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 200s
data:
  database:
    driver: postgres
    source: ""
saga:
  enabled: false
  max_payment_attempts: 3
  per_attempt_timeout: 60s
  payment_initial_delay: 0.5s
  payment_backoff_max: 30s
  mark_paid_retry_max: 5
  mark_paid_budget: 5m
  drain_timeout: 30s
