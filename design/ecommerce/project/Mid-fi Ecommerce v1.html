<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mid-fi Ecommerce — Apple style</title>
  <meta name="viewport" content="width=1800" />
  <link rel="stylesheet" href="apple.css" />
  <link rel="stylesheet" href="midfi.css" />
  <style>
    html, body { margin: 0; padding: 0; background: var(--surface-3); }
    body { font-family: var(--font-text); color: var(--ink); -webkit-font-smoothing: antialiased; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="mf_kit.jsx"></script>
  <script type="text/babel" src="mf_home.jsx"></script>
  <script type="text/babel" src="mf_listing.jsx"></script>
  <script type="text/babel" src="mf_pdp.jsx"></script>
  <script type="text/babel" src="mf_cart_checkout_account.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TABS = [
      { id: "home", label: "Home", title: "Home — Editorial hero", caption: "Full-bleed product moments in the Apple store tradition — giant headlines, serif italic sub-lines, two stacked hero tiles, then a shop-the-latest grid.", Comp: HomeV2 },
      { id: "listing", label: "Listing", title: "Listing — Top filter bar", caption: "Horizontal filter chips pin to the top of the page so the grid gets the full width. Active filters show as removable pills above the grid.", Comp: ListingV2 },
      { id: "pdp", label: "PDP", title: "PDP — Gallery + buy box", caption: "Thumbnails left, large hero center, sticky buy box right. Color, storage and Care+ selectors; three-up highlights section below the fold.", Comp: PDPV1 },
      { id: "cart", label: "Cart", title: "Cart — Full page", caption: "Centered, editorial review-your-bag layout with inline quantity controls, suggested add-ons, and a sticky summary with promo + express pay.", Comp: CartV1 },
      { id: "checkout", label: "Checkout", title: "Checkout — Single-page accordion", caption: "Contact, delivery, payment stacked as steps. Completed steps collapse to a one-line summary with an Edit link. Sticky order summary on the right.", Comp: CheckoutV2 },
      { id: "account", label: "Account", title: "Account — Orders hub", caption: "Left-rail account nav, orders listed as cards with a status header strip. Quick actions per order (track, buy again, invoice).", Comp: AccountV1 },
    ];

    function App() {
      const [active, setActive] = useState(() => localStorage.getItem("midfi_tab") || "home");
      useEffect(() => { localStorage.setItem("midfi_tab", active); }, [active]);
      const tab = TABS.find(t => t.id === active) || TABS[0];
      const Comp = tab.Comp;

      return (
        <div className="mf-app">
          <header className="mf-header">
            <div className="mf-eyebrow">Mid-fidelity · Pass 2</div>
            <h1 className="mf-title">Mid-fi ecommerce, Apple-styled.</h1>
            <p className="mf-intro">
              One direction per screen, built out with Apple-style typography, washes, and
              component rhythm. Each tab shows <b>desktop + mobile</b> of a single variation.
              Navigate with the tabs below — your place is remembered across reloads.
            </p>
          </header>

          <div className="mf-tabs" role="tablist">
            {TABS.map(t => (
              <div
                key={t.id}
                role="tab"
                aria-selected={active === t.id}
                className={`mf-tab ${active === t.id ? "active" : ""}`}
                onClick={() => setActive(t.id)}
              >{t.label}</div>
            ))}
          </div>

          <div className="mf-content" data-screen-label={tab.label}>
            <Variation
              title={tab.title}
              caption={tab.caption}
              desktop={
                <div>
                  <DesktopFrame url={`shop.com/${tab.id}`} w={1280} h={820}>
                    <Comp mobile={false} />
                  </DesktopFrame>
                  <div className="frame-caption">Desktop · 1280 × 820</div>
                </div>
              }
              mobile={
                <div>
                  <MobileFrame w={340} h={720}>
                    <Comp mobile={true} />
                  </MobileFrame>
                  <div className="frame-caption">Mobile · 340 × 720</div>
                </div>
              }
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
